services:
  postgres:
    image: postgres:16
    container_name: psp_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: psp_user
      POSTGRES_PASSWORD: psp_password
      POSTGRES_DB: private_school_db
    networks:
      - backend
    restart: always

networks:
  backend:

volumes:
  postgres_data: